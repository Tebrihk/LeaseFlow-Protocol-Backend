# Default values for LeaseFlow Backend Helm Chart
# This configures Kubernetes deployment with health probes

replicaCount: 3

image:
  repository: leaseflow/backend
  pullPolicy: IfNotPresent
  tag: "1.0.0"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: leaseflow-backend.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: leaseflow-backend-tls
  #    hosts:
  #      - leaseflow-backend.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Environment configuration
environment: production

# Redis configuration
redis:
  host: redis-cluster.default.svc.cluster.local
  port: 6379

# Extra environment variables
extraEnv: {}

# Health Probe Configurations
# These are critical for Kubernetes to understand pod health

livenessProbe:
  # Liveness Probe - Checks if the container is still running
  # If this fails, Kubernetes will restart the container
  initialDelaySeconds: 30    # Wait 30s before first check (allows app startup)
  periodSeconds: 10          # Check every 10 seconds
  timeoutSeconds: 5          # Timeout after 5 seconds
  failureThreshold: 3        # Fail after 3 consecutive failures
  successThreshold: 1        # Succeed after 1 success

readinessProbe:
  # Readiness Probe - Checks if the container is ready to serve traffic
  # If this fails, Kubernetes stops routing traffic to this pod
  initialDelaySeconds: 5     # Wait 5s before first check (app should be ready quickly)
  periodSeconds: 5           # Check every 5 seconds
  timeoutSeconds: 3          # Timeout after 3 seconds
  failureThreshold: 3        # Fail after 3 consecutive failures
  successThreshold: 1        # Succeed after 1 success

startupProbe:
  # Startup Probe - Checks if the container has started successfully
  # Provides longer timeout for heavy initialization (Prisma ORM, migrations, etc.)
  initialDelaySeconds: 10    # Wait 10s before first check
  periodSeconds: 10          # Check every 10 seconds
  timeoutSeconds: 5          # Timeout after 5 seconds
  failureThreshold: 12       # Fail after 12 failures (2 minutes total: 12 * 10s)
  successThreshold: 1        # Succeed after 1 success

# Pod annotations
podAnnotations: {}

# Volume mounts
volumeMounts: []

# Volumes
volumes: []

# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  maxUnavailable: ""

# Horizontal Pod Autoscaler
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""

# Network policies
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# Resource monitoring
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    path: /metrics
    port: http

# Graceful shutdown
terminationGracePeriodSeconds: 30

# Init containers for database migrations
initContainers: []

# Sidecar containers
sidecars: []
